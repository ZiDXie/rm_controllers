#!/usr/bin/env python3
PACKAGE = "rm_chassis_controllers"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

gen.add("vel_coeff", double_t, 0, "velocity coefficient for power limit", 0.000, 0.000, 0.100)
gen.add("effort_coeff", double_t, 0, "effort coefficient for power limit", 0.0, 0.0, 20.0)
gen.add("power_offset", double_t, 0, "power offset for power limit", 0.0, -50.0, 50.0)
gen.add("pivot_max_power", double_t, 0, "maximum power for pivot joints", 0.0, 0.0, 100.0)
gen.add("pivot_effort_coeff", double_t, 0, "effort coefficient for pivot power limit", 0.0, 0.0, 20.0)
gen.add("pivot_vel_coeff", double_t, 0, "velocity coefficient for pivot power limit", 0.000, 0.000, 0.100)
gen.add("pivot_power_ratio", double_t, 0, "power ratio for pivot joints", 0.0, 0.0, 1.0)

exit(gen.generate(PACKAGE, "chassis_controller", "PowerLimit"))
